Configuration:
  status: warn

  Properties:
    Property:
      name: Log4jContextSelector
      value: org.apache.logging.log4j.core.async.AsyncLoggerContextSelector
  
  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{ISO8601} [%t] %-5level %logger{36} - xxx %msg%n"
  
  Loggers:
    Logger:
      - name: payment-service
        level: info
        additivity: false
        AppenderRef:
          - ref: Console
      
      - name: fraud-detection-service
        level: info
        additivity: false
        AppenderRef:
          - ref: Console
    
    Root:
      level: warn
      AppenderRef:
        - ref: Console