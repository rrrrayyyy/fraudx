name: kafka-cluster

services:
  controller-1:
    image: apache/kafka:4.1.0
    container_name: controller-1
    hostname: controller-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m -XX:+UseG1GC"
    mem_limit: 1g
    mem_swappiness: 0
    volumes:
      - kafka-data-controller-1:/var/lib/kafka
    networks:
      - kafka-net

  controller-2:
    image: apache/kafka:4.1.0
    container_name: controller-2
    hostname: controller-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m -XX:+UseG1GC"
    mem_limit: 1g
    mem_swappiness: 0
    volumes:
      - kafka-data-controller-2:/var/lib/kafka
    networks:
      - kafka-net

  controller-3:
    image: apache/kafka:4.1.0
    container_name: controller-3
    hostname: controller-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m -XX:+UseG1GC"
    mem_limit: 1g
    mem_swappiness: 0
    volumes:
      - kafka-data-controller-3:/var/lib/kafka
    networks:
      - kafka-net      

  broker-1:
    image: apache/kafka:4.1.0
    container_name: broker-1
    hostname: broker-1
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: BROKER://:19092,HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://broker-1:19092,HOST://localhost:9004
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_HEAP_OPTS: "-Xmx2g -Xms2g -XX:MetaspaceSize=96m -XX:MinMetaspaceFreeRatio=50 -XX:MaxMetaspaceFreeRatio=80 -XX:+ExplicitGCInvokesConcurrent -XX:+UseG1GC -XX:G1HeapRegionSize=2M -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9004:9092"
    mem_limit: 9g
    mem_swappiness: 0
    volumes:
      - kafka-data-broker-1:/var/lib/kafka
    networks:
      - kafka-net
    depends_on:
      - controller-1
      - controller-2
      - controller-3

  broker-2:
    image: apache/kafka:4.1.0
    container_name: broker-2
    hostname: broker-2
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: BROKER://:19092,HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://broker-2:19092,HOST://localhost:9005
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_HEAP_OPTS: "-Xmx2g -Xms2g -XX:MetaspaceSize=96m -XX:MinMetaspaceFreeRatio=50 -XX:MaxMetaspaceFreeRatio=80 -XX:+ExplicitGCInvokesConcurrent -XX:+UseG1GC -XX:G1HeapRegionSize=2M -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9005:9092"
    mem_limit: 9g
    mem_swappiness: 0
    volumes:
      - kafka-data-broker-2:/var/lib/kafka
    networks:
      - kafka-net
    depends_on:
      - controller-1
      - controller-2
      - controller-3

  broker-3:
    image: apache/kafka:4.1.0
    container_name: broker-3
    hostname: broker-3
    environment:
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: BROKER://:19092,HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://broker-3:19092,HOST://localhost:9006
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_HEAP_OPTS: "-Xmx2g -Xms2g -XX:MetaspaceSize=96m -XX:MinMetaspaceFreeRatio=50 -XX:MaxMetaspaceFreeRatio=80 -XX:+ExplicitGCInvokesConcurrent -XX:+UseG1GC -XX:G1HeapRegionSize=2M -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9006:9092"
    mem_limit: 9g
    mem_swappiness: 0
    volumes:
      - kafka-data-broker-3:/var/lib/kafka
    networks:
      - kafka-net
    depends_on:
      - controller-1
      - controller-2
      - controller-3

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - 8888:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:19092,broker-2:19092,broker-3:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - kafka-net
    depends_on:
      - controller-1
      - controller-2
      - controller-3
      - broker-1
      - broker-2
      - broker-3

volumes:
  kafka-data-controller-1:
  kafka-data-controller-2:
  kafka-data-controller-3:
  kafka-data-broker-1:
  kafka-data-broker-2:
  kafka-data-broker-3:

networks:
  kafka-net:
