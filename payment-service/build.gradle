plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.7'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.kafka:spring-kafka'
    implementation 'org.apache.kafka:kafka-clients:4.1.0'
	implementation "com.google.protobuf:protobuf-java:4.33.0"
	implementation project(":proto")
	implementation 'com.fasterxml.uuid:java-uuid-generator:5.1.1'
    implementation 'ch.qos.logback:logback-classic'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

tasks.register("composeUp") {
    if (System.getProperty('composeUpD')) {
        println "🔧 Restarting Docker Compose environment..."

        exec {
            commandLine "bash", "-c", "docker compose down -v --remove-orphans"
        }

        def String clusterId = java.util.UUID.randomUUID().toString()
        def env = [
            "CLUSTER_ID": clusterId
        ]
        println "🌐 Generated CLUSTER_ID: ${clusterId}"

        exec {
            environment env
            commandLine "docker", "compose", "up", "-d"
        }

        println "⏳ Waiting for Kafka to become available (localhost:9004)..."
        exec {
            ignoreExitValue true
            commandLine "bash", "-c", """
                for i in {1..30}; do
                    nc -z localhost 9004 && echo "✅ Kafka is up!" && exit 0
                    echo "Waiting for Kafka... (\$i)"
                    sleep 2
                done
                echo "❌ Kafka did not start in time" >&2
                exit 1
            """
        }
    } 
}

tasks.named('bootRun') {
    dependsOn("composeUp")
    def kafkaConnect = System.getProperty("kafka.connect") == "true"
    systemProperty "kafka.connect", kafkaConnect.toString()

    if (kafkaConnect) {
        println "🔗 Performing Kafka connection setup..."
    }
}
