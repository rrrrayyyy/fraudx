spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: broker-1:19092,broker-2:19092,broker-3:19092
    producer:
      key-serializer: com.example.payment_service.adapter.KafkaProtobufSerializer
      value-serializer: com.example.payment_service.adapter.KafkaProtobufSerializer
      linger-ms: 5
    admin:
      auto-create: true
      fail-fast: false

kafka:
  connect: false
  topics:
    payment:
      name: payment-events
      partitions: 4
      replication-factor: 3