spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: localhost:9004,localhost:9005,localhost:9006
    producer:
      compression-type: none
      batch-size: 16384
      linger-ms: 5
      acks: all

kafka:
  connect: false
  topics:
    payment:
      name: payment-events
      partitions: 4
      replication-factor: 3