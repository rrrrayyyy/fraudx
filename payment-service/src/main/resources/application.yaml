spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: broker-1,broker-2,broker-3
    producer:
      compression-type: none
      buffer-memory: 33554432
      batch-size: 16384
      linger-ms: 5
      acks: all

kafka:
  connect: false
  topics:
    payment:
      name: payment-events
      partitions: 4
      replication-factor: 3