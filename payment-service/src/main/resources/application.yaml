spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: localhost:9004,localhost:9005,localhost:9006
    producer:
      compression-type: lz4
      batch-size: 1048576      # 1MB
      linger-ms: 50
      acks: 1

kafka:
  connect: false
  topics:
    payment:
      name: payment-events
      partitions: 4
      replication-factor: 3