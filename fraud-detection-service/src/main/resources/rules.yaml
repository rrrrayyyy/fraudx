fraud-detection:
  rules:
    transaction-frequency:
      target-attributes:
        card-id:
          enabled: false
          threshold: 5
          duration: 1
          time-unit: "MINUTE"
        device-id:
          enabled: false
          threshold: 5
          duration: 1
          time-unit: "MINUTE"
    amount-deviation:
      enabled: false
      sigma-threshold: 3
      history-duration: 30
      time-unit: "DAY"
      min-transactions: 10
    user-linkage:
      target-attributes:
        card-id:
          enabled: false
          linkage-threshold: 2
        device-id:
          enabled: false
          linkage-threshold: 2
        ip-address:
          enabled: false
          linkage-threshold: 2
