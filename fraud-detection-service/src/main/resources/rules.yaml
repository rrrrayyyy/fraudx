fraud-detection:
  rules:
    transaction-frequency:
      target-attributes:
        card-id:
          enabled: false
          threshold: 5
          duration: 1m
        device-id:
          enabled: false
          threshold: 5
          duration: 1m
    amount-deviation:
      enabled: false
      sigma-threshold: 3
      history-duration: 30d
      min-transactions: 10
    user-linkage:
      target-attributes:
        card-id:
          enabled: false
          linkage-threshold: 2
        device-id:
          enabled: false
          linkage-threshold: 2
        ip-address:
          enabled: false
          linkage-threshold: 2
