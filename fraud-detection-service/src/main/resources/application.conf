datastax-java-driver {
    basic {
        request {
            timeout = 1800 seconds
            # consistency = LOCAL_ONE
        }
    }
    advanced {
        connection {
            connect-timeout = 1800 seconds
            init-query-timeout = 1800 seconds
            # pool.local.size = 1
            # pool.local.size = 2
            # pool.local.size = 4
            pool.local.size = 8
            # pool.local.size = 16
            # pool.local.size = 64
            # pool.local.size = 128
            # max-requests-per-connection = 1024
            # max-requests-per-connection = 4096
            # max-requests-per-connection = 8192
        }
        reconnection-policy.max-delay = 1800 seconds
        socket.keep-alive = true
        # protocol.compression = lz4
    }
}