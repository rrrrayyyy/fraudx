spring:
  application:
    name: fraud-detection-service
  config:
    import:
      - rules.yaml
  kafka:
    bootstrap-servers: broker-1:19092,broker-2:19092,broker-3:19092
    consumer:
      group-id: fraud-detection
      key-deserializer: com.example.fraud_detection_service.adapter.KafkaProtobufDeserializer
      value-deserializer: com.example.fraud_detection_service.adapter.KafkaProtobufDeserializer
      properties:
        protobuf.key.type: com.example.proto.Event$PaymentEventKey
        protobuf.value.type: com.example.proto.Event$PaymentEventValue
      max-partition-fetch-bytes: 1048576
      concurrency: 4
  cassandra:
    contact-points: scylladb-1,scylladb-2,scylladb-3
    local-datacenter: datacenter1
    keyspace-name: fraudx
    config: classpath:application.conf

kafka:
  topics:
    payment:
      name: payment-events
