spring:
  application:
    name: fraud-detection-service
  config:
    import:
      - rules.yaml
  kafka:
    bootstrap-servers: broker-1:19092,broker-2:19092,broker-3:19092
    consumer:
      group-id: fraud-detection
      key-deserializer: com.example.frauddetection.adapter.KafkaProtobufDeserializer
      value-deserializer: com.example.frauddetection.adapter.KafkaProtobufDeserializer
      properties:
        protobuf.key.type: com.example.proto.PaymentEventKey
        protobuf.value.type: com.example.proto.PaymentEventValue
      max-partition-fetch-bytes: 1048576
      concurrency: 4
  threads:
    virtual:
      enabled: true

kafka:
  topics:
    payment:
      name: payment-events

scylla:
  contact-points:
    - "scylladb-1"
    - "scylladb-2"
    - "scylladb-3"
  local-datacenter: datacenter1
  keyspace: fraudx
