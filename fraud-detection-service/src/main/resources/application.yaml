spring:
  application:
    name: fraud-detection-service
  config:
    import:
      - rules.yaml
  kafka:
    bootstrap-servers: localhost:9004,localhost:9005,localhost:9006
    consumer:
      group-id: fraud-detection
      fetch-min-size: 1
      max-partition-fetch-bytes: 1048576
      enable-auto-commit: true
      max-poll-records: 500
      concurrency: 4

kafka:
  topics:
    payment:
      name: payment-events