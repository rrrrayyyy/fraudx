spring:
  application:
    name: fraud-detection-service
  config:
    import:
      - rules.yaml
  kafka:
    bootstrap-servers: broker-1,broker-2,broker-3
    consumer:
      group-id: fraud-detection
      fetch-min-size: 1
      max-partition-fetch-bytes: 1048576
      enable-auto-commit: true
      max-poll-records: 500
      concurrency: 4
  cassandra:
    contact-points: scylladb-1,scylladb-2,scylladb-3
    compression: NONE
    local-datacenter: datacenter1
  data:
    redis:
      cluster:
        nodes: 192.168.2.201:6379,192.168.2.202:6379,192.168.2.203:6379

kafka:
  topics:
    payment:
      name: payment-events

scylladb:
  connect: false
  keyspace-name: fraudx
  replication-factor: 3