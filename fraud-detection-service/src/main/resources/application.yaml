spring:
  application:
    name: fraud-detection-service
  config:
    import:
      - classpath:rules.yaml
  kafka:
    bootstrap-servers: broker-1:19092,broker-2:19092,broker-3:19092
    consumer:
      group-id: fraud-detection
      key-deserializer: com.example.kafka.KafkaProtobufDeserializer
      value-deserializer: com.example.kafka.KafkaProtobufDeserializer
      properties:
        protobuf.key.type: com.example.proto.PaymentEventKey
        protobuf.value.type: com.example.proto.PaymentEventValue
      max-partition-fetch-bytes: 1048576
      concurrency: 4
    producer:
      key-serializer: com.example.kafka.KafkaProtobufSerializer
      value-serializer: com.example.kafka.KafkaProtobufSerializer
  threads:
    virtual:
      enabled: true

kafka:
  consumer:
    max-retries: 5
    max-backoff-ms: 5000
  topics:
    payment:
      name: payment-events
    fraud-alerts:
      name: fraud-alerts
      partitions: 3
      replication-factor: 3

scylla:
  contact-points:
    - "scylladb-1"
    - "scylladb-2"
    - "scylladb-3"
  local-datacenter: datacenter1
  keyspace: fraudx
  lookback: 1000
